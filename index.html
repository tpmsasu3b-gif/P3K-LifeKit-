<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#DC2626">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="P3K Stock">
    
    <title>P3K Stock Manager</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <link rel="preload" href="css/style.css" as="style">
    <link rel="preload" href="js/app.js" as="script">
    
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Perbaikan CSS inline kritis untuk Mobile UX */
        :root {
            /* Menangani area notch/poni pada smartphone modern */
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        body {
            /* Mencegah scroll memantul (overscroll) yang mengganggu di iOS */
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: calc(60px + var(--safe-area-bottom)); /* Ruang untuk bottom nav */
        }

        .app-header {
            padding-top: var(--safe-area-top);
        }

        /* Memastikan input tidak melakukan zoom otomatis di iOS (font size min 16px) */
        input, select, textarea {
            font-size: 16px !important;
        }

        /* Perbaikan posisi Bottom Nav agar tidak tertutup home indicator iPhone */
        .bottom-nav {
            padding-bottom: var(--safe-area-bottom);
            height: calc(60px + var(--safe-area-bottom));
        }

        /* Menghilangkan delay klik pada tombol mobile */
        button, .nav-item, .chip {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>

    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-logo">🚑</div>
            <div class="loading-spinner"></div>
            <p class="loading-text">Memuat aplikasi...</p>
        </div>
    </div>

    <header class="app-header" role="banner">
        <div class="header-container">
            <div class="header-top">
                <div class="brand">
                    <div class="brand-icon">🚑</div>
                    <div class="brand-text">
                        <h1 class="brand-title">P3K Stock</h1>
                        <span class="brand-subtitle">Manager</span>
                    </div>
                </div>
                
                <div class="header-actions">
                    <button id="sync-btn" class="icon-btn sync-btn" aria-label="Sinkronisasi">
                        <span class="sync-icon">🔄</span>
                    </button>
                    <button id="menu-btn" class="icon-btn menu-btn" aria-label="Menu">
                        <span class="menu-icon">☰</span>
                    </button>
                </div>
            </div>

            <div class="connection-status" id="connection-status">
                <span class="status-icon">●</span>
                <span class="status-text">Online</span>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value" id="stat-total">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-card stat-warning">
                    <span class="stat-value" id="stat-expiring">0</span>
                    <span class="stat-label">Akan Exp</span>
                </div>
                <div class="stat-card stat-danger">
                    <span class="stat-value" id="stat-expired">0</span>
                    <span class="stat-label">Expired</span>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" class="main-content">
        <div id="alert-container" class="alert-container"></div>

        <section class="search-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input 
                    type="search" 
                    id="search-input" 
                    placeholder="Cari item P3K..." 
                    enterkeyhint="search"> </div>
            
            <div class="filter-wrapper">
                <div class="filter-chips" id="filter-chips">
                    <button class="chip active" data-category="all">Semua</button>
                    <button class="chip" data-category="Obat">Obat</button>
                    <button class="chip" data-category="Perban">Perban</button>
                    <button class="chip" data-category="Alat">Alat</button>
                    <button class="chip" data-category="Antiseptik">Antiseptik</button>
                </div>
            </div>
        </section>

        <section class="inventory-section">
            <div id="inventory-list" class="inventory-list">
                </div>

            <div id="empty-state" class="empty-state" hidden>
                <div class="empty-icon">📦</div>
                <h3>Stok Kosong</h3>
                <button class="btn btn-primary" onclick="app.openModal()">Tambah Item</button>
            </div>
        </section>

        <button id="add-btn" class="fab" aria-label="Tambah">
            <span class="fab-icon">+</span>
        </button>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" data-view="home">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Beranda</span>
        </button>
        <button class="nav-item" data-view="stats">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Statistik</span>
        </button>
        <button class="nav-item" data-view="history">
            <span class="nav-icon">📋</span>
            <span class="nav-label">Riwayat</span>
        </button>
        <button class="nav-item" data-view="settings">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Pengaturan</span>
        </button>
    </nav>

    <script src="js/app.js" defer></script>
    
    <script>
        // Registrasi SW & Lock Screen Orientation (Opsional)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }

        // Mencegah pull-to-refresh di Chrome Mobile jika sedang di dalam modal
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
